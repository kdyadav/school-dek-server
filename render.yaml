# Render Blueprint for the skooldesk API server.
# Docs: https://render.com/docs/blueprint-spec
#
# Provisions:
#   - skooldesk-api      web service (Node, Fastify)
#   - skooldesk-db       managed Postgres
#
# NOTE: Render's free web tier does NOT support persistent disks. The local
# storage driver will therefore lose uploaded logos/favicons on every deploy
# or restart. To make uploads durable, either:
#   1. Upgrade the service to a paid plan and re-add a `disk:` block here, or
#   2. Implement and switch to an S3-compatible storage driver.

databases:
  - name: skooldesk-db
    plan: free
    databaseName: skooldesk
    user: skooldesk

services:
  - type: web
    name: skooldesk-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: skooldesk-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "10"
      # Local storage is non-durable on the free tier (no persistent disk).
      # Uploads land under the project working dir and are wiped each deploy.
      - key: STORAGE_DRIVER
        value: local
      - key: STORAGE_LOCAL_DIR
        value: ./var/uploads
      # Set these from the dashboard once the service URL is known and the UI
      # is deployed. CORS_ORIGIN is comma-separated.
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: LOG_LEVEL
        value: info
